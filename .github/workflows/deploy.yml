name: Deploy Docusaurus

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Docusaurus
        uses: actions/cache@v4
        with:
          path: |
            .docusaurus
            node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Build site
        env:
          GENERATE_SOURCEMAP: false
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4